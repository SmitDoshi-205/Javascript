<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav id="navbar">
      <div class="toggle-wrapper">
        <span class="theme-icon">☀️</span>

        <label class="switch">
          <input type="checkbox" id="theme-toggle" onchange="changeMode()" />
          <span class="slider"></span>
        </label>

        <span class="theme-icon">🌙</span>
      </div>
    </nav>

    <h1 class="heading">Tic-Tac-Toe</h1>

    <div id="container">
      <div class="box1"></div>
      <div class="box2"></div>
      <div class="box3"></div>
      <div class="box4"></div>
      <div class="box5"></div>
      <div class="box6"></div>
      <div class="box7"></div>
      <div class="box8"></div>
      <div class="box9"></div>
    </div>

    <div id="result"></div>

    <button id="reset-btn">Reset Game</button>
    <script src="script.js"></script>
  </body>
</html>
